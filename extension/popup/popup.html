<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <svg class="logo" width="20" height="20" viewBox="0 0 24 24" fill="#da7756">
      <path d="M4.709 15.955l4.72-2.647.08-.23-.08-.128H4.104v-.08l2.878-1.17-.107-.312h-.063L3.87 12.802v-.064l6.048-3.318V9.3L4.14 6.622l.064-.064 4.848 1.336.063-.063-.08-.392L4.66 3.893 8.34 5.58l.312-.072V5.34L6.35 2.766l2.374 1.68.08-.064-.032-.44L6.83.782 9.3 3.67l.12-.048.064-3.59h.064l.663 3.222.168.056L12.12.614v.064l-.92 3.406.072.128h.08L14.12.766v.08l-1.92 3.83.064.104 3.63-2.63-.064.08-2.35 3.734.04.12.128.024 3.934-1.4-.08.08-3.07 2.63v.08l.112.063 3.83-.92-.064.08-3.35 1.6v.04l.12.128 3.566.128-.08.064-3.606.695-.064.136.032.048 3.83 1.4-.08.048-3.83-.015-.128.104-.008.072 3.35 2.446-.08.032-3.59-1.344-.12.064-.04.104 2.342 3.35-.08.016-2.998-2.566-.088.056-.128.168.87 3.95h-.08l-1.664-3.35-.112-.04-.08.04-.6 4.12h-.064l.12-3.862-.12-.136-.088.008-1.92 3.398-.048-.064.84-3.83-.072-.12-.136-.024-2.566 2.998-.032-.08 1.824-3.59-.056-.128-.104-.024-3.19 1.824.048-.08 2.566-2.87-.048-.127-.12-.016-3.67.463z"/>
    </svg>
    <span class="title">Browser Feedback</span>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Enable widget on this page</span>
    <label class="toggle-switch">
      <input type="checkbox" id="toggle">
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div id="widget-details" style="display: none;">
    <div class="status-row">
      <span class="status-dot" id="status-dot"></span>
      <span class="status-text" id="status-text">Connecting...</span>
    </div>

    <div id="connection-notice" class="connection-notice" style="display: none;"></div>

    <div id="active-session" class="active-session" style="display: none;">
      <span class="active-session-label">Session:</span>
      <span id="active-session-name" class="active-session-name"></span>
      <button id="change-session" class="change-session-btn" title="Change session">Change</button>
    </div>

    <div id="session-picker" class="session-picker" style="display: none;">
      <label class="settings-label">Select project session</label>
      <div id="session-list" class="session-list"></div>
    </div>

    <hr>

    <div class="settings">
      <label class="settings-label" for="server-url">Server URL</label>
      <div class="url-row">
        <input type="text" id="server-url" placeholder="http://localhost:9877">
        <button id="save-url" title="Save">Save</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
